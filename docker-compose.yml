services:
  postgres:
    image: postgres:16-alpine
    container_name: lifee-postgres
    environment:
      POSTGRES_DB: lifee
      POSTGRES_USER: lifee
      POSTGRES_PASSWORD: lifee_dev_password
    ports:
      - "5432:5432"
    volumes:
      - lifee_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifee -d lifee"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifee-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lifee_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lifee_postgres_data:
  lifee_redis_data:
